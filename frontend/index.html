<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Churn Predictor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Customer Churn Predictor</h1>
<p class="subtitle">Enter customer details to predict churn risk and get retention strategies</p>

<div class="container">

  <!-- INPUT FORM -->
  <div class="card">
    <h2>Customer Details</h2>
    <div class="form-grid">

      <div class="form-group">
        <label>Tenure (months)</label>
        <input type="number" id="tenure" value="2" min="0" max="72"/>
      </div>

      <div class="form-group">
        <label>Monthly Charges ($)</label>
        <input type="number" id="MonthlyCharges" value="85" min="0"/>
      </div>

      <div class="form-group">
        <label>Total Charges ($)</label>
        <input type="number" id="TotalCharges" value="170" min="0"/>
      </div>

      <div class="form-group">
        <label>Contract Type</label>
        <select id="Contract">
          <option value="0">Month-to-month</option>
          <option value="1">One year</option>
          <option value="2">Two year</option>
        </select>
      </div>

      <div class="form-group">
        <label>Internet Service</label>
        <select id="InternetService">
          <option value="0">DSL</option>
          <option value="1">Fiber Optic</option>
          <option value="2">No</option>
        </select>
      </div>

      <div class="form-group">
        <label>Payment Method</label>
        <select id="PaymentMethod">
          <option value="0">Bank Transfer</option>
          <option value="1">Credit Card</option>
          <option value="2">Electronic Check</option>
          <option value="3">Mailed Check</option>
        </select>
      </div>

      <div class="form-group">
        <label>Online Security</label>
        <select id="OnlineSecurity">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Tech Support</label>
        <select id="TechSupport">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Phone Service</label>
        <select id="PhoneService">
          <option value="1">Yes</option>
          <option value="0">No</option>
        </select>
      </div>

      <div class="form-group">
        <label>Multiple Lines</label>
        <select id="MultipleLines">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Streaming TV</label>
        <select id="StreamingTV">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Streaming Movies</label>
        <select id="StreamingMovies">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Online Backup</label>
        <select id="OnlineBackup">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Device Protection</label>
        <select id="DeviceProtection">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select id="gender">
          <option value="0">Female</option>
          <option value="1">Male</option>
        </select>
      </div>

      <div class="form-group">
        <label>Senior Citizen</label>
        <select id="SeniorCitizen">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Partner</label>
        <select id="Partner">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Dependents</label>
        <select id="Dependents">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Paperless Billing</label>
        <select id="PaperlessBilling">
          <option value="1">Yes</option>
          <option value="0">No</option>
        </select>
      </div>

      <button class="predict-btn" onclick="predict()">
        Predict Churn Risk
      </button>

    </div>
  </div>

  <!-- RESULT PANEL -->
  <div class="result-card" id="resultPanel">
    <h2>Prediction Result</h2>
    <div class="placeholder" id="placeholder">
      Fill in customer details and click Predict
    </div>
    <div id="results" style="display:none; display:flex; flex-direction:column; gap:16px;">

      <div class="verdict" id="verdict"></div>

      <div class="prob-bar-wrap">
        <label>Churn Probability</label>
        <div class="prob-bar">
          <div class="prob-fill" id="probFill" style="width:0%"></div>
        </div>
        <div class="prob-pct" id="probPct">0%</div>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="val" id="riskBadge"></div>
          <div class="lbl">Risk Group</div>
        </div>
        <div class="stat-box">
          <div class="val" id="clvVal"></div>
          <div class="lbl">Annual CLV Estimate</div>
        </div>
      </div>

      <div>
        <h3 style="font-size:0.9rem; color:#aaa; margin-bottom:10px;">
          Retention Strategies
        </h3>
        <div class="strategies" id="strategies"></div>
      </div>

    </div>
  </div>

</div>

<script src = "index.js"></script>

</body>
</html>
